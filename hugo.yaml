baseURL: "https://shuguo.archi"
title: "Shu Guo | Modular Poetics"
theme: "PaperMod"

pagination:
  pagerSize: 7

enableRobotsTXT: true
enableGitInfo: true

defaultContentLanguage: "en"
languageCode: "en-us"
hasCJKLanguage: true

languages:
  en:
    languageName: "English"
    weight: 1

build:
  writeStats: true
  useResourceCacheWhen: "always"

menu:
  main:
    - identifier: industrial-signals
      name: Industrial Signals
      url: /industrial-signals/
      weight: 10

    - identifier: field-notes
      name: Field Notes
      url: /field-notes/
      weight: 20

    - identifier: visual-studies
      name: Visual Studies
      url: /visual-studies/
      weight: 30

    - identifier: essays
      name: Essays
      url: /essays/
      weight: 40

    - identifier: about
      name: About
      url: /about/
      weight: 50

params:
  env: production
  defaultTheme: auto

  ShowPostMeta: true
  ShowPostCopyright: false
  customCopyright: true
  customHead: true

  footer:
    hideCopyright: true

  ShowReadingTime: true
  ShowShareButtons: false
  ShowBreadCrumbs: true
  ShowPostNavLinks: true

  description: "A body of work by Shu Guo on modular poetics, housing systems, MMC, visual studies, and the design of delivery."
  author: "Shu Guo"

  keywords:
    - modular poetics
    - housing systems
    - systems thinking
    - MMC
    - modern methods of construction
    - prefabrication
    - housing crisis
    - design systems
    - delivery systems
    - visual studies
    - classical gardens
    - chinese architecture

  images:
    - /images/site-feature-image.jpg

  analytics:
    google:
      SiteVerificationTag: ""

  socialIcons:
    - name: github
      url: "https://github.com/downunderShu"
    - name: linkedin
      url: "https://linkedin.com/in/shu-guo-80b69634"

  assets:
    disableHLJS: false
    disableFingerprinting: false

markup:
  goldmark:
    renderer:
      unsafe: true
  highlight:
    style: github-dark

outputs:
  home:
    - HTML
    - RSS
  page:
    - HTML
  section:
    - HTML
  taxonomy:
    - HTML
  term:
    - HTML